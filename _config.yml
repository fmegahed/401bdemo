about_content: |
  I'm Fadel Megahed, a business analytics professional passionate about transforming complex data into actionable insights that drive strategic decision-making. My academic journey has equipped me with a comprehensive foundation in analytics, from optimization techniques and database management to advanced business intelligence and data visualization. I thrive at the intersection of technology and business, where analytical rigor meets real-world impact.
  
  Through my coursework and hands-on projects, I've developed strong technical skills in data analysis, database design, optimization modeling, and creating compelling visual narratives from data. My project exploring Occupational and Employment Wage Statistics showcases my ability to work with large datasets, extract meaningful patterns, and communicate findings effectively. I'm particularly drawn to projects that require both analytical depth and creative problem-solving.
  
  I'm actively seeking opportunities where I can apply my analytical expertise to solve challenging business problems, whether through internships, full-time roles, or collaborative projects. I'm especially interested in positions that value data-driven decision-making and offer the chance to work with cross-functional teams. I'm eager to contribute to organizations that are committed to leveraging analytics for innovation and competitive advantage.

content:
  - title: Projects
    layout: list
    content:
      - layout: top-middle
        title: Exploring the Occupational and Employment Wage Statistics
        description: |
          This personal project develops an interactive R Shiny application to explore and visualize Occupational and Employment Wage Statistics data. The application leverages R's data manipulation and visualization capabilities to enable users to analyze wage trends and employment patterns across different occupations and regions. This tool provides valuable insights for workforce planning, career research, and labor market analysis by making complex employment statistics more accessible and understandable.
          
          - Developed interactive R Shiny dashboard to visualize and analyze occupational wage statistics across multiple employment sectors and geographic regions
          - Engineered data processing pipeline using R to clean, transform, and aggregate Bureau of Labor Statistics employment wage data for statistical analysis
          - Created dynamic data visualization tools enabling users to explore wage trends, compare occupational categories, and identify employment patterns across demographics
          
          **Project Files:**
          - [app.R](https://github.com/fmegahed/401bdemo/blob/main/projects/exploring-the-occupational-and-employment-wage-sta/app.R)
